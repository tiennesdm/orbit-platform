# =============================================================================
# ORBIT — Production Docker Compose
# =============================================================================
# Production deployment with:
#   - postgres (Vedadb-compatible)
#   - api (NestJS)
#   - web (Next.js)
#   - nginx (TLS termination + reverse proxy)
#
# Run: docker compose -f docker-compose.prod.yml up -d
# Stop: docker compose -f docker-compose.prod.yml down
# Logs: docker compose -f docker-compose.prod.yml logs -f
# =============================================================================

version: '3.9'

x-api-env: &api-env
  NODE_ENV: production
  VEDADB_HOST: postgres
  VEDADB_PORT: 5432
  VEDADB_DATABASE: orbit
  VEDADB_USER: orbit
  VEDADB_PASSWORD: ${POSTGRES_PASSWORD}
  VEDADB_SSL: 'false'  # Set to 'true' if postgres has TLS
  VEDADB_ENGINE: postgres
  VEDADB_MAX_CONNECTIONS: '20'
  JWT_SECRET: ${JWT_SECRET}
  CORS_ORIGINS: ${CORS_ORIGINS}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: '0.1'
  API_PORT: '4000'
  API_DOCS_PUBLIC: 'false'
  TRUST_PROXY: 'true'
  BODY_LIMIT: '5mb'
  LOG_LEVEL: 'info'
  AUTO_MIGRATE: 'true'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orbit
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *api-env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health/ready', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: '100m'
        max-file: '5'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: https://${PUBLIC_DOMAIN}/api/v1
      NEXT_PUBLIC_WEB_BASE: https://${PUBLIC_DOMAIN}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  nginx:
    image: nginx:1.25-alpine
    restart: always
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  nginx_logs:
