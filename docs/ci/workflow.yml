# =============================================================================
# ORBIT — CI Workflow
# =============================================================================
# Runs on every PR and push to main:
#   1. Lint
#   2. Typecheck
#   3. Test
#   4. Build (smoke)
# =============================================================================

name: CI

on:
  push:
    branches: [main, feat/**, fix/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint api
        run: cd apps/api && pnpm lint || true

      - name: Lint web
        run: cd apps/web && pnpm lint || true

  # ---------------------------------------------------------------------------
  # Typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck api
        run: cd apps/api && pnpm exec tsc --noEmit

      - name: Typecheck web
        run: cd apps/web && pnpm exec tsc --noEmit

      - name: Typecheck mobile
        run: cd apps/mobile && pnpm exec tsc --noEmit || true

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orbit
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: orbit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      VEDADB_ENGINE: postgres
      VEDADB_HOST: localhost
      VEDADB_PORT: 5432
      VEDADB_DATABASE: orbit_test
      VEDADB_USER: orbit
      VEDADB_PASSWORD: test_password
      VEDADB_SSL: 'false'
      JWT_SECRET: test-jwt-secret-min-32-chars-long-xxxxxxxx
      CORS_ORIGINS: http://localhost:3000,http://localhost:8081
      API_PORT: '4000'
      LOG_LEVEL: warn
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: |
          PGPASSWORD=test_password psql -h localhost -U orbit -d orbit_test -f db/migrations/*.sql || true

      - name: Test api
        run: cd apps/api && pnpm test --passWithNoTests

      - name: Test web
        run: cd apps/web && pnpm test --passWithNoTests

  # ---------------------------------------------------------------------------
  # Build (smoke)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api
        run: cd apps/api && pnpm build
        env:
          TS_NODE_TRANSPILE_ONLY: 'true'

      - name: Build web
        run: cd apps/web && pnpm build

      - name: Upload api dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

      - name: Upload web dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/.next
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Docker (only on main + push, not PRs)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/orbit-api:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/orbit-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/orbit-web:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/orbit-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max