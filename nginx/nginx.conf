# =============================================================================
# ORBIT — Production nginx config
# =============================================================================
# - TLS 1.2/1.3 only with strong ciphers
# - HTTP/2
# - Rate limiting at the edge (in addition to app-level throttler)
# - Security headers
# - Reverse proxy for API + Web
# - Gzip compression
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'reqid=$request_id';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # Security headers (extra layer beyond app)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Upstream — adjust to your service names
    upstream orbit_api {
        least_conn;
        server api:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream orbit_web {
        least_conn;
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Rate limit logging
    limit_req_status 429;
    limit_conn_status 429;

    # Map request ID (use $request_id if set, else generate)
    map $request_id $log_request_id {
        default $request_id;
        "" $request_id;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80 default_server;
        server_name _;
        # ACME challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Strong TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Body size (for media uploads)
        client_max_body_size 100M;
        client_body_timeout 60s;
        client_header_timeout 60s;
        send_timeout 60s;
        keepalive_timeout 60s;

        # Security headers (extra layer)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Hide nginx version
        server_tokens off;

        # Logging with request ID
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # Health check (no rate limit)
        location = /health/live {
            proxy_pass http://orbit_api/health/live;
            access_log off;
        }
        location = /health/ready {
            proxy_pass http://orbit_api/health/ready;
            access_log off;
        }
        location = /health/startup {
            proxy_pass http://orbit_api/health/startup;
            access_log off;
        }

        # API routes
        location /api/ {
            # Stricter rate limit for auth endpoints
            location ~ ^/api/v1/(identity|auth)/(signup|login|register|login/options|login/verify) {
                limit_req zone=auth_rl burst=5 nodelay;
                proxy_pass http://orbit_api;
            }
            # General API rate limit
            limit_req zone=api_rl burst=20 nodelay;
            limit_conn conn_per_ip 20;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering off;
        }

        # WebSocket support (for real-time features)
        location /ws {
            proxy_pass http://orbit_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Metrics endpoint (restrict access if needed)
        location = /metrics {
            # Bind to localhost only — use internal network
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://orbit_api/metrics;
        }

        # Web app (Next.js)
        location / {
            limit_req zone=global burst=20 nodelay;
            limit_conn conn_per_ip 20;

            proxy_pass http://orbit_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering off;
        }

        # Static assets — long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            proxy_pass http://orbit_web;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
